name: Build and Sonar

on:
  push:
  pull_request:

jobs:
  sonar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build, test, coverage and Sonar scan
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "SONAR_TOKEN secret is not configured"
            exit 1
          fi

          if [ -z "${SONAR_HOST_URL:-}" ]; then
            echo "SONAR_HOST_URL repository variable is not configured"
            exit 1
          fi

          if [ -z "${SONAR_PROJECT_KEY:-}" ]; then
            echo "SONAR_PROJECT_KEY repository variable is not configured"
            exit 1
          fi

          SONAR_HOST_URL="${SONAR_HOST_URL%/}"

          if [[ "${SONAR_HOST_URL}" == "https://sonarcloud.io" ]] && [ -z "${SONAR_ORGANIZATION:-}" ]; then
            echo "SONAR_ORGANIZATION repository variable is required for SonarCloud"
            exit 1
          fi

          SONAR_ARGS=(
            "-Dsonar.token=${SONAR_TOKEN}"
            "-Dsonar.projectKey=${SONAR_PROJECT_KEY}"
            "-Dsonar.host.url=${SONAR_HOST_URL}"
          )

          if [ -n "${SONAR_ORGANIZATION:-}" ]; then
            SONAR_ARGS+=("-Dsonar.organization=${SONAR_ORGANIZATION}")
          fi

          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:5.6.0.6792:sonar "${SONAR_ARGS[@]}"
